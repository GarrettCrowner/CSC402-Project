<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Rammy Chatbot</title>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="chatbot-popup">
            <div class="chat-header">
                <div class="header-info">
                    <h2 class="logo-text">Rammy</h2>
                </div>
                <button id="close-chatbot"
                class="material-symbols-outlined">close</button>

                <button id="menu-chatbot"
                class="material-symbols-outlined">menu</button>

            </div>
            <div class="chat-body">
                <div class="message bot-message">
                    <img 
                    src="42918289_171450867074435_8248653647391490048_n.jpg"
                    class="bot-avatar"
                    width="40" 
                    height="40">
                    <div class="bot-content">
                    <div class="bot-name">
                        Rammy
                    </div>
                    <div class="message-text">
                    Hi, my name is Rammy. I am a chatbot here to help with all of your HR related questions! How can I help?</div>
                </div>
                </div>
                <div class="message user-message">
                    <div class="message-text">
                    hello</div>
                </div>
                <div class="message bot-message">
                    <img 
                    src="42918289_171450867074435_8248653647391490048_n.jpg"
                    class="bot-avatar"
                    width="40" 
                    height="40">
                    <div class="message-text">
                    <div class="thinking-indicator">
                        <div class="dot"></div>
                        <div class="dot"></div>
                        <div class="dot"></div>
                    </div></div>
                </div>
            </div>
            <div class="chat-footer">
                <form action="#" class="chat-form">
                    <textarea placeholder="Message..." id="" class="message-input"></textarea>
                    <div class="chat-controls">
                        <button type="button" class="material-symbols-rounded">attach_file</button>
                    </div>
                </form>
                <button type="submit" class="send-btn">
                    <svg width="30" height="30" viewBox="0 0 1719 1590" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M1630 44.5047L1066.81 1548.3L696.478 867.605L1630 44.5047Z" fill="#3F0C3F" stroke="#3F0C3F" stroke-width="83" stroke-linejoin="round"/>
                    <path d="M41.5012 474.507L1632.5 41.5046L675.858 846.505L41.5012 474.507Z" fill="#771677" stroke="#771677" stroke-width="83" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
        </div>
    </body>
</html>
