<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Rammy Chatbot</title>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="chatbot-popup">
            <div class="chat-header">
                <div class="header-info">
                    <h2 class="logo-text">Rammy</h2>
                </div>
                <button id="close-chatbot"
                class="material-symbols-outlined">close</button>

                <button id="menu-chatbot"
                class="material-symbols-outlined">menu</button>

            </div>
            <div class="chat-body">
                <div class="message bot-message">
                    <img 
                    src="42918289_171450867074435_8248653647391490048_n.jpg"
                    class="bot-avatar"
                    width="40" 
                    height="40">
                    <div class="message-text">
                    Hi, my name is Rammy. I am a chatbot here to help with all of your HR related questions! How can I help?</div>
                </div>
                <div class="message user-message">
                    <div class="message-text">
                    hello</div>
                </div>
                <div class="message bot-message">
                    <img 
                    src="42918289_171450867074435_8248653647391490048_n.jpg"
                    class="bot-avatar"
                    width="40" 
                    height="40">
                    <div class="message-text">
                    <div class="thinking-indicator">
                        <div class="dot"></div>
                        <div class="dot"></div>
                        <div class="dot"></div>
                    </div></div>
                </div>
            </div>
            <div class="chat-footer">
                <form action="#" class="chat-form">
                    <textarea placeholder="Message..." id="" class="message-input"></textarea>
                    <div class="chat-controls">
                        <button type="button" class="material-symbols-rounded">sentiment_satisfied</button>
                        <button type="button" class="material-symbols-rounded">attach_file</button>
                        <button type="submit" class="material-symbols-rounded">arrow_upward</button>
                    </div>
                </form>
            </div>
        </div>
    </body>
</html>
